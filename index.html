<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sphere Material Lab</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#000;font-family:Arial}
canvas{display:block}
#ui{position:fixed;top:10px;left:10px;width:260px;max-height:90vh;overflow:auto;background:rgba(0,0,0,.75);color:white;padding:12px;border-radius:12px;z-index:10}
label{display:block;margin-top:8px;font-size:12px}
input,select,button{width:100%;box-sizing:border-box}
h2{font-size:16px;margin:0 0 8px}
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
  }
}
</script>
</head>

<body>
<div id="ui">
<h2>Sphere Material Lab</h2>

<label>Material</label>
<select id="preset">
<option value="chrome">Chrome</option>
<option value="gold">Gold</option>
<option value="plastic">Plastic</option>
<option value="glass">Glass</option>
<option value="rubber">Rubber</option>
</select>

<label>Color</label>
<input id="color" type="color" value="#aaaaaa">

<label>Metalness</label>
<input id="metalness" type="range" min="0" max="1" step="0.01" value="0.6">

<label>Roughness</label>
<input id="roughness" type="range" min="0" max="1" step="0.01" value="0.18">

<label>Clearcoat</label>
<input id="clearcoat" type="range" min="0" max="1" step="0.01" value="0.5">

<label>Light Intensity</label>
<input id="intensity" type="range" min="0" max="15" step="0.1" value="6">

<label>Light X</label>
<input id="lx" type="range" min="-10" max="10" step="0.1" value="4">

<label>Light Y</label>
<input id="ly" type="range" min="-10" max="10" step="0.1" value="5">

<label>Light Z</label>
<input id="lz" type="range" min="-10" max="10" step="0.1" value="4">

<label>Environment Brightness</label>
<input id="env" type="range" min="0" max="3" step="0.05" value="1.2">

<button id="spin">Toggle Spin</button>
</div>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x101018);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 1.1, 4);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, .7, 0);

function makeEnvTexture(){
  const c = document.createElement("canvas");
  c.width = 1024;
  c.height = 512;
  const ctx = c.getContext("2d");

  const g = ctx.createLinearGradient(0,0,0,512);
  g.addColorStop(0,"#dff3ff");
  g.addColorStop(.45,"#3b4968");
  g.addColorStop(.55,"#111118");
  g.addColorStop(1,"#050505");
  ctx.fillStyle = g;
  ctx.fillRect(0,0,1024,512);

  ctx.fillStyle = "#ffffff";
  ctx.fillRect(80,80,180,80);
  ctx.fillRect(720,120,160,120);
  ctx.fillRect(430,40,80,220);

  const tex = new THREE.CanvasTexture(c);
  tex.mapping = THREE.EquirectangularReflectionMapping;
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

const envTexture = makeEnvTexture();
scene.environment = envTexture;

const material = new THREE.MeshPhysicalMaterial({
  color: 0xaaaaaa,
  metalness: .6,
  roughness: .18,
  clearcoat: .5,
  clearcoatRoughness: .05,
  envMapIntensity: 1.2
});

const sphere = new THREE.Mesh(
  new THREE.SphereGeometry(1,128,128),
  material
);
sphere.position.y = 1;
scene.add(sphere);

const floor = new THREE.Mesh(
  new THREE.CircleGeometry(6,128),
  new THREE.MeshPhysicalMaterial({
    color:0x181818,
    metalness:.25,
    roughness:.25,
    envMapIntensity:1
  })
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

const key = new THREE.PointLight(0xffffff,6,50);
key.position.set(4,5,4);
scene.add(key);

const fill = new THREE.PointLight(0x88bbff,1.5,50);
fill.position.set(-4,3,3);
scene.add(fill);

const rim = new THREE.PointLight(0xffffff,3,50);
rim.position.set(-3,4,-4);
scene.add(rim);

const lightBall = new THREE.Mesh(
  new THREE.SphereGeometry(.08,32,32),
  new THREE.MeshBasicMaterial({color:0xffffff})
);
scene.add(lightBall);

function $(id){return document.getElementById(id);}

const presets = {
  chrome:{color:"#cccccc",metalness:1,roughness:.03,clearcoat:.7},
  gold:{color:"#ffd36a",metalness:1,roughness:.12,clearcoat:.5},
  plastic:{color:"#2388ff",metalness:0,roughness:.28,clearcoat:.45},
  glass:{color:"#dff8ff",metalness:0,roughness:.01,clearcoat:1,transmission:.75},
  rubber:{color:"#111111",metalness:0,roughness:.85,clearcoat:0}
};

function updateMaterial(){
  material.color.set($("color").value);
  material.metalness = +$("metalness").value;
  material.roughness = +$("roughness").value;
  material.clearcoat = +$("clearcoat").value;
  material.clearcoatRoughness = .05;
  material.transmission = material.userData.transmission || 0;
  material.thickness = 1;
  material.ior = 1.5;
  material.envMapIntensity = +$("env").value;
  material.transparent = material.transmission > 0;
  material.needsUpdate = true;
}

$("preset").onchange = () => {
  const p = presets[$("preset").value];
  $("color").value = p.color;
  $("metalness").value = p.metalness;
  $("roughness").value = p.roughness;
  $("clearcoat").value = p.clearcoat;
  material.userData.transmission = p.transmission || 0;
  updateMaterial();
};

["color","metalness","roughness","clearcoat","env"].forEach(id=>{
  $(id).oninput = updateMaterial;
});

$("spin").onclick = () => {
  controls.autoRotate = !controls.autoRotate;
};

function animate(){
  requestAnimationFrame(animate);

  key.intensity = +$("intensity").value;
  key.position.set(+$("lx").value,+$("ly").value,+$("lz").value);
  lightBall.position.copy(key.position);

  sphere.rotation.y += .003;

  controls.update();
  renderer.render(scene,camera);
}

animate();

addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
